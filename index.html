* {

body {

  align-items: center;

  color: #fff;
  overflow: hidden;
  position: relative;
}

/* fundo blur */
body::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image: var(--bg-gif);
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;

  opacity: 0.35;

}

body::after {

}

.avatar {

.bio {

}

/* Botões principais */
/* Botões principais */
.links {

}

.links a,

  box-shadow: inset 0 0 0 rgba(255,255,255,0);

  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

.links a:hover,
.change-bg-btn:hover {
  transform: translateY(-2px) scale(1.01);
  background: rgba(255, 255, 255, 0.11);
  border-color: rgba(255, 255, 255, 0.18);
  box-shadow:
    0 8px 20px rgba(0, 0, 0, 0.25),
    0 0 18px rgba(255, 255, 255, 0.05);
}

.link-icon {
  width: 22px;
  min-width: 22px;
  height: 22px;
  display: grid;
  place-items: center;
}

.link-icon i {

}

.link-name {

  letter-spacing: 0.2px;
  line-height: 1;
}

.change-bg-btn {

  outline: none;
  margin: 0;
  font-size: 1rem;
}
/* Ícones sociais redondos */
.socials {

  justify-content: center;
  gap: 14px;

.socials a {

.kick-social-icon {

/* animação do Jason e Dwight no canto */

.character-gif {

<script>
  const fundos = [
    'url("./Jasn1.gif")',
    'url("./Jasn2.gif")'
  ];

  let fundoAtual = 0;

  const btnFundo = document.getElementById("changeBgBtn");

  btnFundo.addEventListener("click", () => {
    fundoAtual = (fundoAtual + 1) % fundos.length;
    document.body.style.setProperty("--bg-gif", fundos[fundoAtual]);
  });

  const jasonAction = document.getElementById("jasonAction");
  const jasonFreeze = document.getElementById("jasonFreeze");
  const dwightAction = document.getElementById("dwightAction");

  const GIF_APARICAO = "./JasonAparicao.gif";
  const GIF_JOGANDO = "./GifJogandoArpao2.gif";
  const GIF_DWIGHT = "./DwightArpao2.gif";

  /*
    Ajuste esses tempos conforme a duração real dos seus GIFs.

    Exemplo:
    2500 = 2.5 segundos
    3000 = 3 segundos
  */
  const DURACAO_APARICAO = 1000;
  const DURACAO_JOGANDO = 1000;
  const DURACAO_DWIGHT = 1100;
  const PAUSA_ANTES_REINICIAR = 900;

  function tocarGif(img, src) {
    img.style.display = "block";

    // força o GIF a reiniciar do começo
    img.src = "";
    setTimeout(() => {
      img.src = src + "?v=" + Date.now();
    }, 30);
  }

  function esconderElemento(el) {
    el.style.display = "none";

    if (el.tagName === "IMG") {
      el.removeAttribute("src");
    }
  }

  function congelarGif(img, canvas) {
    const ctx = canvas.getContext("2d");

    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;

    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

    img.style.display = "none";
    canvas.style.display = "block";
  }

  function iniciarCena() {
    esconderElemento(dwightAction);
    esconderElemento(jasonFreeze);

    // 1. Jason aparece
    tocarGif(jasonAction, GIF_APARICAO);

    setTimeout(() => {
      // 2. Jason joga o arpão
      tocarGif(jasonAction, GIF_JOGANDO);

      setTimeout(() => {
        // 3. Jason congela no último momento do GIF
        congelarGif(jasonAction, jasonFreeze);

        // 4. Dwight toca logo ao lado
        tocarGif(dwightAction, GIF_DWIGHT);

        setTimeout(() => {
          // 5. Reinicia tudo depois que Dwight terminar
          esconderElemento(dwightAction);
          esconderElemento(jasonFreeze);

          setTimeout(() => {
            iniciarCena();
          }, PAUSA_ANTES_REINICIAR);

        }, DURACAO_DWIGHT);

      }, DURACAO_JOGANDO);

    }, DURACAO_APARICAO);
  }

  window.addEventListener("load", iniciarCena);
</script>
